name: Create Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "README.md"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' manifest.json)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Create release zip
        run: |
          mkdir -p release
          zip -r release/bm-extra-v${{ steps.get_version.outputs.current_version }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "release/*" \
            -x "*.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.current_version }}
          name: Release v${{ steps.get_version.outputs.current_version }}
          body: |
            ## What's Changed

            Release v${{ steps.get_version.outputs.current_version }}

            ### Installation
            1. Download the zip file below
            2. Extract the contents
            3. Load as unpacked extension in your browser
          files: release/bm-extra-v${{ steps.get_version.outputs.current_version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
